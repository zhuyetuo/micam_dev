services:

  # https://github.com/AlexxIT/go2rtc
  # Talks to Xiaomi cloud once (per stream, to refresh short-lived P2P keys),
  # then streams the camera locally over its built-in `xiaomi://` source.
  # Exposes standard RTSP/WebRTC/HLS/API endpoints - no extra bridging needed.
  go2rtc:
    container_name: go2rtc
    image: ghcr.nju.edu.cn/alexxit/go2rtc
    # image: ghcr.io/alexxit/go2rtc   # use this if the mirror above is unreachable
    network_mode: host      # required for WebRTC/HomeKit/UDP negotiation
    privileged: true        # only needed if you enable ffmpeg hw transcoding
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./go2rtc:/config    # go2rtc.yaml lives here; add cameras from :1984 WebUI
