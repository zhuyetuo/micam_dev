services:

  # https://github.com/XiaoMi/xiaomi-miloco
  # Talks to Xiaomi cloud once to get short-lived P2P credentials, then keeps
  # a local session with the camera. Needs internet for the handshake only.
  miloco:
    container_name: miloco
    image: ghcr.nju.edu.cn/miiot/miloco:main # community image, HD stream enabled
    # image: ghcr.io/miiot/miloco:main       # use this if the mirror above is unreachable
    network_mode: host
    environment:
      BACKEND_PORT: ${MILOCO_PORT:-8000}
      BACKEND_LOG_LEVEL: ${MILOCO_LOG_LEVEL:-warning}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./miloco:/app/miloco_server/.temp
    restart: unless-stopped

  # https://github.com/AlexxIT/go2rtc
  # Standard RTSP/WebRTC/HLS server. micam publishes each camera's decoded
  # stream into it, so any downstream tool just talks plain RTSP.
  go2rtc:
    container_name: go2rtc
    image: ghcr.nju.edu.cn/alexxit/go2rtc
    # image: ghcr.io/alexxit/go2rtc
    network_mode: host      # required for WebRTC/HomeKit/UDP negotiation
    privileged: true        # only needed if you enable ffmpeg hw transcoding
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./go2rtc:/config    # go2rtc.yaml lives here, editable from :1984/config.html

  # Bridges one camera: pulls the P2P stream via miloco, republishes it as
  # RTSP into go2rtc at RTSP_URL. One micam* service per physical camera.
  micam1: &micam
    image: ghcr.nju.edu.cn/miiot/micam:main
    # image: ghcr.io/miiot/micam:main
    depends_on: [miloco, go2rtc]
    environment: &micam_envs
      MILOCO_BASE_URL: ${MILOCO_BASE_URL:-https://miloco:8000}
      MILOCO_PASSWORD: ${MILOCO_PASSWORD}
      CAMERA_ID: ${CAMERA_ID}
      RTSP_URL: ${RTSP_URL}
      VIDEO_CODEC: ${VIDEO_CODEC:-hevc}
      STREAM_CHANNEL: ${STREAM_CHANNEL:-0}
      TZ: ${TZ:-Asia/Shanghai}
    restart: always
    extra_hosts:
      - "miloco:${MILOCO_HOST_IP:-host-gateway}"

  # Second camera, disabled by default (scale: 0). Copy this block again
  # (micam3, micam4, ...) for additional cameras.
  micam2:
    <<: *micam
    scale: 0 # set to 1 to enable, and fill CAMERA_2_* in .env
    environment:
      <<: *micam_envs
      CAMERA_ID: ${CAMERA_2_ID}
      RTSP_URL: ${CAMERA_2_RTSP_URL}
